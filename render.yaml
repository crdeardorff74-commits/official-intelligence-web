# Render Blueprint — replaces the flaky GitHub Actions `daily-summary.yml`.
# GitHub's scheduled `cron` is best-effort: it ran ~2.5h late on Jun 9 and was
# dropped entirely on Jun 10. Render fires its cron jobs on time, so the summary
# emails actually go out.
#
# One cron job pings BOTH backends (TANTRO + Circuitousness), same as the old
# workflow. The endpoints are guarded by the DAILY_SUMMARY_KEY secret, sent in
# the `X-Summary-Key` header. Each app emails a digest of the prior America/
# Chicago calendar day.
#
# Schedule is UTC (Render, like GitHub, has no DST): 11:30 UTC = 6:30am CDT /
# 5:30am CST — matching the original intent.
#
# Setup: Render Dashboard → New → Blueprint → connect this repo → it reads this
# file → set DAILY_SUMMARY_KEY when prompted (same value as the GitHub secret).
services:
  - type: cron
    name: daily-summary-emails
    runtime: image
    image:
      url: curlimages/curl:latest
    schedule: "30 11 * * *"
    envVars:
      - key: DAILY_SUMMARY_KEY
        sync: false   # set in the dashboard; never committed
    # Run BOTH pings even if the first fails, but fail the run if either does
    # (better visibility than the old workflow's always()-then-ignore steps).
    dockerCommand: >-
      sh -c 'rc=0;
      curl --fail --silent --show-error --retry 5 --retry-delay 15 -X POST
      -H "X-Summary-Key: $DAILY_SUMMARY_KEY"
      https://blockchainstorm.onrender.com/api/admin/daily-summary || rc=1;
      curl --fail --silent --show-error --retry 5 --retry-delay 15 -X POST
      -H "X-Summary-Key: $DAILY_SUMMARY_KEY"
      https://circuitousness-api.onrender.com/api/admin/daily-summary || rc=1;
      exit $rc'
