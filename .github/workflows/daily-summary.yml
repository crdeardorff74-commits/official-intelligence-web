name: Daily summary emails
# `on:` is written on one line (flow style) on purpose — it removes the
# indented block that GitHub was failing to parse. UTC cron, no DST:
# 11:30 UTC is ~6:30am CDT / ~5:30am CST. workflow_dispatch = manual button.
"on": { workflow_dispatch: {}, schedule: [ { cron: "30 11 * * *" } ] }
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: TANTRO daily summary
        env:
          KEY: ${{ secrets.DAILY_SUMMARY_KEY }}
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 15 -X POST \
            -H "X-Summary-Key: $KEY" \
            "https://blockchainstorm.onrender.com/api/admin/daily-summary"
      - name: Circuitousness daily summary
        if: always()
        env:
          KEY: ${{ secrets.DAILY_SUMMARY_KEY }}
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 15 -X POST \
            -H "X-Summary-Key: $KEY" \
            "https://circuitousness-api.onrender.com/api/admin/daily-summary"
